name: Java CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B install -DskipTests -Dgpg.skip=true
      # NEU: alle aufgelösten Abhängigkeiten exportieren (kein Scope-Filter)
      
      - name: Export resolved dependencies
        run: mvn -B dependency:copy-dependencies -DoutputDirectory=deps

      - name: Collect deps into one folder
        run: |
          mkdir -p all-deps
          find . -path '*/deps/*.jar' -exec cp -n {} all-deps/ \;
          ls all-deps | wc -l
      
      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-deps
          path: all-deps

  dynamic-detection:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download deps artifact
        uses: actions/download-artifact@v4
        with:
          name: maven-deps
          path: ./deps

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run detector
        run: java -jar dynamicDetection/detectionSystem-1.0-SNAPSHOT-all.jar --mode=full .

      - uses: actions/upload-artifact@v4
        with:
          name: detection-results
          path: |
            dynamic-detection-results.xlsx
            dynamic-detection-results.csv
            sbom-output.json
